    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 2rem;
        }

        .grid-container {
            max-width: 900px;
            width: 100%;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(2px);
            border-radius: 2.5rem;
            padding: 2rem;
            box-shadow: 0 25px 45px rgba(0, 0, 0, 0.3), 0 0 0 1px rgba(255, 255, 255, 0.1);
        }

        h1 {
            text-align: center;
            font-size: 2rem;
            font-weight: 600;
            background: linear-gradient(135deg, #f0f9ff, #c084fc);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 0.5rem;
        }

        .sub {
            text-align: center;
            color: #94a3b8;
            margin-bottom: 2rem;
            font-size: 0.95rem;
        }

        .button-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1.5rem;
        }

        .nav-btn {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 0.8rem;
            text-align: center;
            background: linear-gradient(145deg, #1e293b, #0f172a);
            border-radius: 1.5rem;
            padding: 1.5rem 1rem;
            text-decoration: none;
            font-weight: 700;
            font-size: 1.1rem;
            color: #f1f5f9;
            transition: all 0.25s ease;
            box-shadow: 0 8px 14px rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.08);
            cursor: pointer;
        }

        .nav-btn:hover {
            transform: translateY(-5px);
            background: linear-gradient(145deg, #2d3a52, #111827);
            box-shadow: 0 18px 28px -8px rgba(0, 0, 0, 0.5);
            border-color: rgba(192, 132, 252, 0.4);
        }

        .nav-btn:active {
            transform: translateY(2px);
        }

        /* Единый размер для всех иконок */
        .btn-icon {
            width: 60px;
            height: 60px;
            object-fit: contain;
            display: block;
            margin: 0 auto;
        }

        /* Для SVG особая обработка */
        .btn-icon.svg-icon {
            width: 60px;
            height: 60px;
        }

        .btn-text {
            display: block;
            font-size: 1rem;
            font-weight: 600;
            letter-spacing: 0.5px;
        }

        @media (max-width: 600px) {
            .button-grid {
                grid-template-columns: 1fr;
                gap: 1rem;
            }
            .btn-icon {
                width: 50px;
                height: 50px;
            }
            .nav-btn {
                padding: 1.2rem;
                flex-direction: row;
                justify-content: flex-start;
                gap: 1rem;
            }
            .btn-text {
                font-size: 1.1rem;
            }
        }

        .footer-note {
            text-align: center;
            margin-top: 2rem;
            font-size: 0.75rem;
            color: #475569;
            background: rgba(0,0,0,0.3);
            padding: 0.6rem;
            border-radius: 2rem;
            width: fit-content;
            margin-left: auto;
            margin-right: auto;
        }
    </style>
